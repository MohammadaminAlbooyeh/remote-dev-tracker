version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: remote_dev_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/remote_dev_tracker
      SECRET_KEY: change-me-to-a-random-secret-key
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - db

  frontend:
    build: frontend/
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
